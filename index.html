<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebAR Booklet — Edison's Phonograph</title>
    <script src="js/three.js"></script>
    <script src="js/tween.umd.js"></script>
    <script src="loaders/GLTFLoader.js"></script>
    <script src="loaders/MTLLoader.js"></script>
    <script src="loaders/OBJLoader.js"></script>
    <script src="jsartoolkit5/artoolkit.min.js"></script>
    <script src="jsartoolkit5/artoolkit.api.js"></script>
    <script src="threex/threex-artoolkitsource.js"></script>
    <script src="threex/threex-artoolkitcontext.js"></script>
    <script src="threex/threex-arbasecontrols.js"></script>
    <script src="threex/threex-armarkercontrols.js"></script>
  </head>

  <body style="margin:0px; overflow:hidden; font-family:Monospace; user-select:none; pointer-events:none;">

    <!-- START SCREEN -->
    <div id="startButton" style="
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(10,22,40,0.97);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      z-index:9999; pointer-events:all; cursor:pointer;
    " onclick="startAR()">
      <div style="font-size:52px; margin-bottom:18px;">🎙️</div>
      <div style="color:#e8c56d; font-size:11px; letter-spacing:5px; margin-bottom:10px;">VARIANT 28 · OPERATING SYSTEMS</div>
      <div style="color:#ffffff; font-family:Georgia,serif; font-size:22px; font-weight:bold; margin-bottom:6px; text-align:center; padding:0 20px;">
        Натисніть на екран для отримання доступу до WebAR-буклету «Фонограф Едісона»
      </div>
      <div style="color:#4a6fa5; font-size:13px; margin-bottom:40px;">WebAR Interactive Booklet</div>
      <div style="
        background:linear-gradient(135deg,#e8c56d,#c9973a);
        color:#0d1b2a; padding:14px 44px; border-radius:40px;
        font-size:14px; font-weight:bold; letter-spacing:1px;
      ">▶ Press to Start AR</div>
      <div style="color:#344d66; font-size:11px; margin-top:24px; text-align:center; max-width:280px; line-height:1.7;">
        Point your camera at the booklet markers<br>to view multimedia content
      </div>
    </div>

    <script>
      var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setClearColor(new THREE.Color('lightgrey'), 0);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.domElement.style.position = 'absolute';
      renderer.domElement.style.top = '0px';
      renderer.domElement.style.left = '0px';
      document.body.appendChild(renderer.domElement);

      var scene  = new THREE.Scene();
      var camera = new THREE.Camera();
      scene.add(camera);

      var ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
      scene.add(ambientLight);

      var arToolkitSource, arToolkitContext;

      function startAR() {
        document.getElementById('startButton').style.display = 'none';
        initAR();
      }

      function initAR() {
        arToolkitSource = new THREEx.ArToolkitSource({ sourceType: 'webcam' });
        arToolkitSource.init(function onReady() { onResize(); });
        window.addEventListener('resize', function () { onResize(); });

        function onResize() {
          arToolkitSource.onResizeElement();
          arToolkitSource.copyElementSizeTo(renderer.domElement);
          if (arToolkitContext.arController !== null) {
            arToolkitSource.copyElementSizeTo(arToolkitContext.arController.canvas);
          }
        }

        arToolkitContext = new THREEx.ArToolkitContext({
          cameraParametersUrl: 'data/camera_para.dat',
          detectionMode: 'mono',
          matrixCodeType: '3x3'
        });
        arToolkitContext.init(function onCompleted() {
          camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
        });

        // Helper: flat image plane
        function makeImagePlane(src) {
          var tex  = new THREE.TextureLoader().load(src);
          var geo  = new THREE.PlaneGeometry(1.8, 1.1);
          var mat  = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
          var mesh = new THREE.Mesh(geo, mat);
          mesh.rotation.x = -Math.PI / 2;
          mesh.position.y = 0.01;
          return mesh;
        }

        // Helper: audio tied to marker visibility
        function bindAudio(audioSrc, markerRoot) {
          var audio   = new Audio(audioSrc);
          var playing = false;
          return function tick() {
            if (markerRoot.visible && !playing) { audio.play(); playing = true;  }
            if (!markerRoot.visible && playing)  { audio.pause(); audio.currentTime = 0; playing = false; }
          };
        }

        // ── MARKER 1 — Booklet author (BarCode)
        var markerRoot1 = new THREE.Group();
        scene.add(markerRoot1);
        new THREEx.ArMarkerControls(arToolkitContext, markerRoot1, {
          type: 'barcode', barcodeValue: 1
        });
        markerRoot1.add(makeImagePlane('1-BC_Author.jpg'));
        var tick1 = bindAudio('1-BC_Author.mp3', markerRoot1);

        // ── MARKER 2 — Edison biography (BarCode)
        var markerRoot2 = new THREE.Group();
        scene.add(markerRoot2);
        new THREEx.ArMarkerControls(arToolkitContext, markerRoot2, {
          type: 'barcode', barcodeValue: 2
        });
        markerRoot2.add(makeImagePlane('2-BC_Edison.jpg'));
        var tick2 = bindAudio('2-BC_Edison.mp3', markerRoot2);

        // ── MARKER 3 — Phonograph working principle (PATTERN marker — замінено з BarCode)
        var markerRoot3 = new THREE.Group();
        scene.add(markerRoot3);
        new THREEx.ArMarkerControls(arToolkitContext, markerRoot3, {
          type      : 'pattern',
          patternUrl: 'pattern-phonograph.patt'
        });
        markerRoot3.add(makeImagePlane('3-BC_Phonograph.jpg'));
        var tick3 = bindAudio('3-BC_Phonograph.mp3', markerRoot3);

        // Render loop
        requestAnimationFrame(function animate() {
          requestAnimationFrame(animate);
          if (!arToolkitSource.ready) return;
          arToolkitContext.update(arToolkitSource.domElement);
          tick1(); tick2(); tick3();
          renderer.render(scene, camera);
        });
      }
    </script>
  </body>
</html>
